<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>InvodTech Ltd - Transform your tech vision into a reality</title>

    <!-- Primary SEO Tags -->
    <title>InvodTech — Trust-Driven SaaS Solutions</title>
    <meta name="description" content="InvodTech builds premium SaaS products including SiteTrust, AgriERP, and custom software solutions for modern businesses." />
    <meta name="keywords" content="SaaS, Software, ERP, Construction, AgriERP, SiteTrust, Custom Software, Kenya, East Africa" />
    <meta name="author" content="InvodTech Ltd" />

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="InvodTech — Trust-Driven SaaS Solutions" />
    <meta property="og:description" content="Premium SaaS products including SiteTrust, AgriERP, and custom software solutions built for transparency and efficiency." />
    <meta property="og:image" content="https://invodtechltd.com/assets/hero-illustration.png" />
    <meta property="og:url" content="https://invodtechltd.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="InvodTech — Trust-Driven SaaS Solutions" />
    <meta name="twitter:description" content="Premium SaaS products including SiteTrust, AgriERP, and custom software solutions built for transparency and efficiency." />
    <meta name="twitter:image" content="https://invodtechltd.com/assets/hero-illustration.png" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- Structured Data JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "InvodTech Ltd",
          "url": "https://invodtechltd.com",
          "logo": "https://invodtechltd.com/assets/logo.png",
          "sameAs": [
            "https://www.linkedin.com/company/invodtech",
            "https://twitter.com/invodtech"
          ]
        },
        {
          "@type": "WebSite",
          "url": "https://invodtechltd.com",
          "name": "InvodTech — Trust-Driven SaaS Solutions",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://invodtechltd.com/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Product",
          "name": "SiteTrust",
          "description": "Construction progress portal for transparency and trust.",
          "brand": "InvodTech",
          "url": "https://invodtechltd.com/products#sitetrust"
        },
        {
          "@type": "Product",
          "name": "AgriERP",
          "description": "Enterprise resource planning for agriculture businesses.",
          "brand": "InvodTech",
          "url": "https://invodtechltd.com/products#agrierp"
        },
        {
          "@type": "Product",
          "name": "Custom Software",
          "description": "Tailored software solutions to fit your business needs.",
          "brand": "InvodTech",
          "url": "https://invodtechltd.com/products#custom-software"
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
